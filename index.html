<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>ahmed.jS</title>
    <link rel="stylesheet" href="resources/main.css">
    <style>
        /* ================================================================
           DESIGN PROFESSIONNEL & RESPONSIVE POUR LA GBA
           ================================================================ */
        
        /* Conteneur principal qui englobe la console */
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px; /* Aligne cette taille avec la largeur de ton image GBA */
            margin: 0 auto;
            background: transparent;
        }

        /* L'écran (Canvas) : Placé au millimètre près en pourcentages */
        #screen {
            position: absolute;
            top: 13.5%;    /* Aligne le haut de l'écran avec le cadre noir */
            left: 17.2%;   /* Aligne la gauche de l'écran avec le cadre noir */
            width: 65.6%;  /* Largeur exacte de la zone d'affichage */
            height: 52.3%; /* Hauteur exacte de la zone d'affichage */
            object-fit: contain; /* Conserve le ratio 3:2 sans déformation */
            background-color: black;
            z-index: 1;
        }

        /* Mode Plein Écran Natif (Bouton Plein Écran) */
        :-webkit-full-screen #screen,
        :-ms-fullscreen #screen,
        :fullscreen #screen {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Statut de la manette Xbox sous la console */
        #gamepad-status {
            text-align: center;
            color: #ffffff;
            font-size: 0.9em;
            margin: 20px 0 10px 0;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        #gamepad-status.connected {
            color: #2ecc71;
            font-weight: bold;
        }

        /* Alignement propre de la section des boutons */
        #controls {
            margin-top: 10px;
        }
    </style>
    
    <script src="js/util.js"></script>
    <script src="js/core.js"></script>
    <script src="js/arm.js"></script>
    <script src="js/thumb.js"></script>
    <script src="js/mmu.js"></script>
    <script src="js/io.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/video.js"></script>
    <script src="js/video/proxy.js"></script>
    <script src="js/video/software.js"></script>
    <script src="js/irq.js"></script>
    <script src="js/keypad.js"></script>
    <script src="js/sio.js"></script>
    <script src="js/savedata.js"></script>
    <script src="js/gpio.js"></script>
    <script src="js/gba.js"></script>
    <script src="resources/xhr.js"></script>

    <script>
        var gba;
        var runCommands = [];
        var debug = null;

        try {
            gba = new GameBoyAdvance();
            gba.keypad.eatInput = true;
            
            // Connexion immédiate avec ton fichier keypad.js
            if (typeof gba.keypad.registerHandlers === "function") {
                gba.keypad.registerHandlers();
            }

            gba.setLogger(function(level, error) {
                console.log(error);
                gba.pause();
                var screen = document.getElementById('screen');
                if (screen.getAttribute('class') == 'dead') {
                    console.log('We appear to have crashed multiple times without reseting.');
                    return;
                }
                var crash = document.createElement('img');
                crash.setAttribute('id', 'crash');
                crash.setAttribute('src', 'resources/crash.png');
                screen.parentElement.insertBefore(crash, screen);
                screen.setAttribute('class', 'dead');
            });

            // Patch Audio stable pour gba.js
            if (gba && gba.audio) {
                var originalClear = gba.audio.clear;
                gba.audio.clear = function() {
                    originalClear.apply(this, arguments);
                    if (this.context && this.jsAudio) {
                        try {
                            this.jsAudio.connect(this.context.destination);
                        } catch (e) {}
                    }
                };

                gba.audio.writeSoundControlHi = function(value) {
                    switch (value & 0x0003) {
                        case 0: this.soundRatio = 0.25; break;
                        case 1: this.soundRatio = 0.50; break;
                        case 2: this.soundRatio = 1; break;
                    }
                    this.ratioChannelA = (((value & 0x0004) >> 2) + 1) * 0.5;
                    this.ratioChannelB = (((value & 0x0008) >> 3) + 1) * 0.5;

                    this.enableRightChannelA = value & 0x0100;
                    this.enableLeftChannelA = value & 0x0200;
                    this.enableChannelA = value & 0x0300;
                    this.soundTimerA = value & 0x0400;
                    if (value & 0x0800) { this.fifoA = []; }
                    
                    this.enableRightChannelB = value & 0x1000;
                    this.enableLeftChannelB = value & 0x2000;
                    this.enableChannelB = value & 0x3000;
                    this.soundTimerB = value & 0x4000;
                    if (value & 0x8000) { this.fifoB = []; }
                };
            }

        } catch (exception) {
            console.error("Erreur d'initialisation de la GBA :", exception);
            gba = null;
        }

        function forceAudioUnblock() {
            if (gba && gba.audio && gba.audio.context) {
                if (gba.audio.context.state === 'suspended') {
                    gba.audio.context.resume();
                }
                if (gba.audio.jsAudio && gba.audio.context.destination) {
                    try {
                        gba.audio.jsAudio.connect(gba.audio.context.destination);
                    } catch(e) {}
                }
                gba.audio.masterEnable = true;
                gba.audio.enabled = true;
            }
        }

        window.onload = function() {
            if (gba && FileReader) {
                var canvas = document.getElementById('screen');
                gba.setCanvas(canvas);
                gba.logLevel = gba.LOG_ERROR;

                loadRom('resources/bios.bin', function(bios) {
                    gba.setBios(bios);
                });

                if (!gba.audio) {
                    var soundbox = document.getElementById('sound');
                    if (soundbox) soundbox.parentElement.removeChild(soundbox);
                }

                if (window.navigator.appName == 'Microsoft Internet Explorer') {
                    var pixelatedBox = document.getElementById('pixelated');
                    pixelatedBox.parentElement.removeChild(pixelatedBox);
                }
                
                // Lancement de la boucle fluide pour la manette Xbox
                updateGamepadLoop();
            } else {
                var dead = document.getElementById('controls');
                dead.parentElement.removeChild(dead);
            }
        }

        // Boucle de rafraîchissement synchrone avec keypad.js
        function updateGamepadLoop() {
            if (gba && gba.keypad && typeof gba.keypad.pollGamepads === "function") {
                gba.keypad.pollGamepads();
            }
            
            // Gestion de l'affichage du statut de la manette
            var statusDiv = document.getElementById("gamepad-status");
            if (statusDiv) {
                const pads = navigator.getGamepads ? navigator.getGamepads() : [];
                let connected = false;
                for (const pad of pads) {
                    if (pad) { connected = true; break; }
                }
                if (connected) {
                    statusDiv.textContent = "🎮 Manette Xbox connectée !";
                    statusDiv.className = "connected";
                } else {
                    statusDiv.textContent = "Aucune manette détectée (Appuyez sur un bouton)";
                    statusDiv.className = "";
                }
            }
            
            requestAnimationFrame(updateGamepadLoop);
        }

        function fadeOut(id, nextId, kill) {
            var e = document.getElementById(id);
            var e2 = document.getElementById(nextId);
            if (!e) return;
            
            var removeSelf = function() {
                if (kill) {
                    e.parentElement.removeChild(e);
                } else {
                    e.setAttribute('class', 'dead');
                    e.removeEventListener('webkitTransitionEnd', removeSelf);
                    e.removeEventListener('oTransitionEnd', removeSelf);
                    e.removeEventListener('transitionend', removeSelf);
                }
                if (e2) {
                    e2.setAttribute('class', 'hidden');
                    setTimeout(function() {
                        e2.removeAttribute('class');
                    }, 0);
                }
            }

            e.addEventListener('webkitTransitionEnd', removeSelf, false);
            e.addEventListener('oTransitionEnd', removeSelf, false);
            e.addEventListener('transitionend', removeSelf, false);
            e.setAttribute('class', 'hidden');
        }

        function run(file) {
            forceAudioUnblock();

            var dead = document.getElementById('loader');
            dead.value = '';
            var load = document.getElementById('select');
            load.textContent = 'Chargement...';
            load.removeAttribute('onclick');
            var pause = document.getElementById('pause');
            pause.textContent = "PAUSE";
            gba.loadRomFromFile(file, function(result) {
                if (result) {
                    for (var i = 0; i < runCommands.length; ++i) {
                        runCommands[i]();
                    }
                    runCommands = [];
                    fadeOut('preload', 'ingame');
                    fadeOut('instructions', null, true);
                    
                    forceAudioUnblock();
                    gba.runStable();
                } else {
                    load.textContent = 'ÉCHEC';
                    setTimeout(function() {
                        load.textContent = 'CHOISIR';
                        load.onclick = function() {
                            document.getElementById('loader').click();
                        }
                    }, 3000);
                }
            });
        }

        function reset() {
            gba.pause();
            gba.reset();
            var load = document.getElementById('select');
            load.textContent = 'CHOISIR';
            var crash = document.getElementById('crash');
            if (crash) {
                var context = gba.targetCanvas.getContext('2d');
                context.clearRect(0, 0, 480, 320);
                gba.video.drawCallback();
                crash.parentElement.removeChild(crash);
                var canvas = document.getElementById('screen');
                canvas.removeAttribute('class');
            } else {
                lcdFade(gba.context, gba.targetCanvas.getContext('2d'), gba.video.drawCallback);
            }
            load.onclick = function() {
                document.getElementById('loader').click();
            }
            fadeOut('ingame', 'preload');
        }

        function uploadSavedataPending(file) {
            runCommands.push(function() { gba.loadSavedataFromFile(file) });
        }

        function togglePause() {
            var e = document.getElementById('pause');
            if (gba.paused) {
                if (debug && debug.gbaCon) {
                    debug.gbaCon.run();
                } else {
                    forceAudioUnblock();
                    gba.runStable();
                }
                e.textContent = "PAUSE";
            } else {
                if (debug && debug.gbaCon) {
                    debug.gbaCon.pause();
                } else {
                    gba.pause();
                }
                e.textContent = "REPRENDRE";
            }
        }

        function goFullscreen() {
            var container = document.getElementById('canvas-container');
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }
        }

        function lcdFade(context, target, callback) {
            var i = 0;
            var drawInterval = setInterval(function() {
                i++;
                var pixelData = context.getImageData(0, 0, 240, 160);
                for (var y = 0; y < 160; ++y) {
                    for (var x = 0; x < 240; ++x) {
                        var xDiff = Math.abs(x - 120);
                        var yDiff = Math.abs(y - 80) * 0.8;
                        var xFactor = (120 - i - xDiff) / 120;
                        var yFactor = (80 - i - ((y & 1) * 10) - yDiff + Math.pow(xDiff, 1 / 2)) / 80;
                        pixelData.data[(x + y * 240) * 4 + 3] *= Math.pow(xFactor, 1 / 3) * Math.pow(yFactor, 1 / 2);
                    }
                }
                context.putImageData(pixelData, 0, 0);
                target.clearRect(0, 0, 480, 320);
                if (i > 40) {
                    clearInterval(drawInterval);
                } else {
                    callback();
                }
            }, 50);
        }

        function setVolume(value) {
            if (gba && gba.audio) {
                gba.audio.masterVolume = Math.pow(2, value) - 1;
            }
        }

        function setPixelated(pixelated) {
            var screen = document.getElementById('screen');
            var context = screen.getContext('2d');
            if (context.webkitImageSmoothingEnabled) {
                context.webkitImageSmoothingEnabled = !pixelated;
            } else if (context.mozImageSmoothingEnabled) {
                context.mozImageSmoothingEnabled = !pixelated;
            } else if (window.navigator.appName != 'Microsoft Internet Explorer') {
                screen.setAttribute('width', '480');
                screen.setAttribute('height', '320');
            }
        }

        document.addEventListener('fullscreenchange', function() {
            var canvas = document.getElementById('screen');
            if (document.fullscreenElement) {
                canvas.style.margin = "0 auto";
            } else {
                canvas.style.removeProperty('margin');
            }
        }, false);
    </script>
</head>
<body>

    <div id="canvas-container">
        <canvas id="screen" width="480" height="320"></canvas>
    </div>
    
    <div id="gamepad-status">Aucune manette détectée (Appuyez sur un bouton)</div>

    <section id="controls">
        <div id="preload">
            <button class="bigbutton" id="select" onclick="forceAudioUnblock(); document.getElementById('loader').click()">CHOISIR</button>
            <input id="loader" type="file" accept=".gba" onchange="run(this.files[0]);">
            <button onclick="document.getElementById('saveloader').click()">Importer une partie sauvegardée</button>
            <input id="saveloader" type="file" onchange="uploadSavedataPending(this.files[0]);">
        </div>
        
        <div id="ingame" class="hidden">
            <button id="pause" class="bigbutton" onclick="togglePause()">PAUSE</button>
            <button class="bigbutton" onclick="reset()">RÉINITIALISER</button>
            <button onclick="gba.downloadSavedata()">Télécharger la partie sauvegardée</button>
            <button onclick="goFullscreen()">Plein écran</button>
            
            <label id="pixelated">
                <input type="checkbox" onchange="setPixelated(this.checked)">
                <p>Pixélisé</p>
            </label>
            
            <div id="sound">
                <input type="checkbox" checked onchange="forceAudioUnblock(); gba.audio.masterEnable = this.checked">
                <p>Son</p>
                <input type="range" min="0" max="1" value="0.5" step="any" onchange="setVolume(this.value)" oninput="setVolume(this.value)">
            </div>
        </div>
    </section>

</body>
</html>
